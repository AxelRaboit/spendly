name: CI

on:
  push:
  pull_request:

jobs:
  laravel:
    name: Laravel ${{ matrix.laravel-version }} | PHP ${{ matrix.php-version }} | Node ${{ matrix.node-version }} | PNPM ${{ matrix.pnpm-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        laravel-version: [ 13 ]
        php-version: [ 8.4 ]
        node-version: [ 24 ]
        pnpm-version: [ 10 ]
    env:
      extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_pgsql, dom, filter, json, gd, zip, tokenizer
      DATABASE_URL: postgresql://app:!ChangeMe!@127.0.0.1:5432/spendly?serverVersion=17&charset=utf8
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: "!ChangeMe!"
          POSTGRES_DB: spendly
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      # —— Setup GitHub actions 🐙 ———————————————————————————————————————————————————
      - name: Checkout
        uses: actions/checkout@v6

      # —— PHP & Composer 🧙‍️ —————————————————————————————————————————————————————————
      - name: Setup PHP, extensions & composer with shivammathur/setup-php
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          extensions: ${{ env.extensions }}
          ini-values: post_max_size=256M, max_execution_time=180
        env:
          update: true

      - name: Check PHP Version
        run: php -v

      - name: Validate composer.json and composer.lock
        run: composer validate

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache PHP dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --no-ansi --no-interaction --prefer-dist

      - name: Check if any dependencies are compromised
        run: composer audit || true

      - name: Install PHP code quality tools
        run: |
          (cd tools/rector && composer install && chmod +x vendor/bin/*)
          (cd tools/phpstan && composer install && chmod +x vendor/bin/*)

      # —— Laravel 🎵 ———————————————————————————————————————————————————————————————————
      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          echo "DB_CONNECTION=pgsql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_DATABASE=spendly" >> .env
          echo "DB_USERNAME=app" >> .env
          echo "DB_PASSWORD=!ChangeMe!" >> .env
          php artisan key:generate
          php artisan migrate --force

      # —— PNPM & Vite 🟨 ————————————————————————————————————————————————————————————
      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install pnpm
        run: npm install -g pnpm@${{ matrix.pnpm-version }}

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build assets
        run: pnpm build

      # —— Coding standards ✨ ——————————————————————————————————————————————————————
      - name: Pint (PHP code style)
        run: make lint-php

      - name: Rector Cache
        uses: actions/cache@v5
        with:
          path: ./storage/app/rector
          key: ${{ runner.os }}-rector-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-rector-

      - name: Rector
        run: make rector

      - name: Lint JavaScript
        run: make lint-js

      # —— Static analysis ✨ —————————————————————————————————————————————————
      - name: PHPStan Cache
        uses: actions/cache@v5
        with:
          path: ./storage/app/phpstan
          key: phpstan-${{ runner.os }}-${{ hashFiles('tools/phpstan/phpstan.neon') }}
          restore-keys: phpstan-${{ runner.os }}-

      - name: PHPStan
        run: make stan

      # —— Tests 🧪 —————————————————————————————————————————————————————————————
      - name: Run tests
        run: make test
